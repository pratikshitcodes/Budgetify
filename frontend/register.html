<!DOCTYPE html>
<html>
    <head>
        <title>
            Registration Page
        </title>
        <link rel="stylesheet" href="/expense-tracker/frontend/register.css">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="register-card">
            <div class="register-container">
                <div class="register-heading">
                    <img src="/expense-tracker/frontend/Ionic-Ionicons-Options.512.png">
                    <p>Welcome To Budgetify</p>
                </div>
                <h2 id="register-head">Register Yourself</h2>
                <div class="email">
                    <p>Email</p>
                    <input placeholder="Enter your email" type="text" id="email-ip">
                </div>
                <div class="password">
                    <p>Password</p>
                    <input placeholder="Enter your password" type="password" id="password-ip">
                </div>
                <div class="register-error">
                    This account already exists
                </div>
                <button class="submit-btn">
                    Submit
                </button>
                <div class="account-exists"> Already have an account?<a href="/expense-tracker/frontend/expense_login.html">
                    Login
                </a></div>
            </div>
        </div>
    </body>
    <script src="/expense-tracker/frontend/register.js"></script>
</html>
